syntax = "proto3";

package agent;
import "google/protobuf/struct.proto";
option go_package = "modules/proto/agentpb";


service AgentService {
  rpc Connect(stream AgentMessage) returns (stream AgentMessage);
}
enum MessageType {
  UNKNOWN = 0;
  HELLO = 1;
  QUERY = 2;
  RESULT = 3;
  ERROR = 4;
  HEARTBEAT = 5;
  ACK = 6;
  COMMAND = 7;
    TRACE = 8;  
}
enum TraceStep {
  GOST_QUERY_RECEIVED  = 0;  
  GOST_DB_EXECUTED     = 1;  
  GOST_RESULT_SENT     = 2;  
}
message TraceEvent {
 string batch_id = 1;
 TraceStep step =2;
 int64 timestamp =3;
 int32 duration_ms =4;
 bool success = 5;
 string error = 6; 
 string message = 7; 

}
enum Db_type{
  MYSQL =0;
  POSTGRESQL=1;
  FIREBIRD=2;
  MSSQL=3;
  MYSQL_OLD =4;

}
enum API_owner {
  FRONTSYS = 0 ;
}
// desc: Which Command was requested
enum Command {
   RESTART_APP =0;
   RESTART_DB =1;
   UPDATE_APP =2;
   CONFIGURE   = 3; 
}
message Commands {
  Command type = 1;
  oneof addInfo {
ACKReturn ack_return =2;
string version = 3;
    ConfigurePayload configure = 4;  // new
  }
}
message ConfigurePayload {
  string token = 1;
  string user  = 2;
}
message AgentMessage {
  string agent_id = 1;
  string batch_id =2;
  string version =3;
  MessageType type = 4;
  string message  = 5;
  AgentPayload  payload  = 6; // AgentPayload to better perfomance will be on of the options
  Table table =7;
  bool isLast =8;
  bool isEmpty =9;

  
}
message AgentPayload {
  oneof data {
    Produtos produtos = 1;
    Vendas   vendas   = 2;
    Clientes clientes = 3;
    Categorias categorias =4;
    Vendedores vendedores =5;
    Financeiros financeiros = 6;
    google.protobuf.ListValue generic_return = 7;
    Query query_request =8;
    Erros    erros    = 9;
    ACKReturn ack_return =10;
    Commands command = 11;
    TraceEvent query_trace =12;
  }
}

message Query {
  string query = 1;
  int32 batchSize =2;
}
enum Table {
  QPRODUTOS =0;
  QCLIENTES =1;
  QCATEGORIAS=2;
  QVENDAS=3;
  QVENDEDORES=4;
  QFINANCEIRO=5;
  QGENERIC=6;
}
message ACKReturn {
  ConnectStatus status =1;
  ConnectedUser connected_user=2;


}
/* API CONNECTION */
message BodyGetToken {
  string token = 1;
  string token_type = 2;
}
message BodyGetTokenTranslatedKeys {
  string token = 1;
  string token_type = 2;
}
message APITokenGetter {
  string raw_token = 1;
  string url_token =2;
  int32 refreshIn =3;
  BodyGetToken get_token_body =4;
  BodyGetTokenTranslatedKeys get_token_response_keys =5;
  repeated string customKeys =6;
  repeated string customValues =7;
}
/* API CONNECTION */

message ConnectedUser {
  oneof db_type {
  Db_type db_conn =1;
  API_owner API_conn= 2;
  }
  bool use_api =3;
  oneof config_json{
  string db_config_json=4;
  APITokenGetter api_token_getter=5;
  }
  string domainws=6;
  string cronjob =7;
  string token_query = 8;
}
enum ConnectStatus {
  REJECTED = 0;
  ACCEPTED = 1;

}
message Erros {
  repeated Error error =1;
}
message Error {
  string code = 1;
  string message = 2;
  string context = 3;
}
// produtos ---
message Produtos {
  repeated Produto items = 1; // batch
}
message Produto {
  string id_externo = 1;
  string nome  = 2;
  string codigo  = 3;
  float valor  = 4;
  string  duracao = 5;
  bool no_buyback = 6;
  int32 comissao =7;
  string categoria  =8;
  string nome_categoria =9;
  string descricao =10;
  string estoque = 11;
  bool contar_estoque = 12;
  bool ativo = 13;  
  string complemento = 14;
}
// produtos ---

// clientes ---
message Clientes {
  repeated Cliente items = 1; // batch
}
message Cliente {
  string id_externo = 1;
  string nome = 2;
  string referencia  = 3;
  string whatsapp = 4;
  string email =5;
  string aniversario =6;
  string pj_ou_pf = 7;
  string cpf_cnpj =8;
  string endereco =9;
  string num =10;
  string bairro =11;
  string cidade =12;
  int32 idade = 13;
  string sexo =14;
  int32 vendedor_id =15;
}
// clientes ---

// categorias ---
message Categorias {
  repeated Categoria items = 1; // batch
}
message Categoria {
  string id_externo = 1;
  string nome        = 2;
}
// categorias ---

// vendedores ---
message Vendedores {
  repeated Vendedor items = 1; // batch
}
message Vendedor {
  string id_externo = 1;
  string nome        = 2;
  string codigo = 3;
  bool todas_permissoes=4;
  bool ativo =5;
}
// vendedores ---
// vendas ---
message Vendas {
  repeated Venda items = 1; // batch
}
message Venda {
  string id_externo = 1;
  int32 empresa        = 2;
  string cliente = 3;
  string vendedor =4;
  string data_compra =5;
  float total_compra =6;
  float valor_liquido=7;
  string tipo_pagamento=8;
  bool recorrente=9;
  int32 parcelas=10;
  float entrada =11;
  string data_vencimento=12;
  string metodo_pagamento=13;
  bool orcamento =14;
  int32 oferecer_denovo =15;
  repeated Produtos_vendas produtos_venda=16;
  string observacao =17;
  repeated Datas_vencimento datas_vencimento=18;

}
message Produtos_vendas {
  string produto_id =1;
  string quantidade =2;
  string valor_unitario =3;
}
message Datas_vencimento {
  string data_vencimento =1;

}
// vendas ---

// vendedores ---
message Financeiros {
  repeated Financeiro items = 1; // batch
}
message Financeiro {
  string id_externo = 1;
  string cliente        = 2;
  string status = 3;
  float valor_total=4;
  int32 parcelas =5;
  float valor_parcela=6;
  string data_vencimento =7; 
  bool data_personalizadas =8;
  repeated InfosCobranca parcelas_cobrancas =9;
  bool recorrente =10;
  string venda =11;
  string media =12;
  string titulo_cobranca=13;
  bool ativo =14;
}
message InfosCobranca {
  string id_externo =1;
  float valor_parcela =2;
  string data_vencimento =3;
  string data_criacao =4;
  string status =5;
  string id_boleto =6;

}
// vendedores ---